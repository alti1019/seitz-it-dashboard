name: Supabase Keep-Alive

on:
  schedule:
    # Every 3 days at 08:00 UTC (prevents Supabase free tier auto-pause after 7 days)
    - cron: '0 8 */3 * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/projekte?select=id&limit=1" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Supabase returned $STATUS – project may need manual restore"
            exit 1
          fi
          echo "Supabase is alive!"
